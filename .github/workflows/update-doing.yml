name: Update Doing Log

on:
  # Poll GitHub for public activity across all repos once a day.
  schedule:
    - cron: "0 7 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: update-doing
  cancel-in-progress: false

jobs:
  update-doing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Sync doing log from GitHub activity
        run: node scripts/update-doing.mjs
        env:
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git add content/doing/updates.yaml content/doing/.sync-state.json
          git diff --quiet --cached && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "[auto] Update doing log for $(date -u +%Y-%m-%d)"
          git push
